name: cheza_games          # was: matatu_game or zzaala
description: Cheza Games — Play Matatu, Chess, Checkers & Ludo online
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.1.0

  # Firebase (online multiplayer)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # UI & Animation
  flutter_animate: ^4.5.0
  audioplayers: ^6.6.0

  # Storage
  shared_preferences: ^2.2.3

  # Games
  chess: ^0.8.1
  http: ^1.6.0


  sensors_plus: ^7.0.0 # detects phone rotation
  wakelock_plus: ^1.5.1 # keep screen on during timer

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/